set_id: "bpc-ic1-2026/skuska"
label: "BPC-IC1 2026 – Skúška"
title: "IC1 skúška – quiz"
sections:
  - id: "sec_1"
    title: "1. Otázky 1–10"
    questions:
      - id: "q1_1"
        type: "mcq"
        label: "1. FileVault v macOS slúži na:"
        options:
          a: "šifrovanie jednotlivých e-mailov"
          b: "šifrovanie celého disku"
          c: "správu používateľských účtov"
          d: "ochranu firewall pravidiel"
        explanation: ""
        answer: "b"
      - id: "q1_2"
        type: "mcq"
        label: "2. FileVault 2 používa primárne:"
        options:
          a: "AES-XTS"
          b: "DES"
          c: "RC4"
          d: "MD5"
        explanation: ""
        answer: "a"
      - id: "q1_3"
        type: "mcq"
        label: "3. APFS je:"
        options:
          a: "starší žurnálovací súborový systém pred HFS+"
          b: "moderný súborový systém Apple, ktorý nahradil HFS+"
          c: "autentizačný protokol Windows"
          d: "linuxový firewall"
        explanation: ""
        answer: "b"
      - id: "q1_4"
        type: "mcq"
        label: "4. HFS+ bol v macOS nahradený:"
        options:
          a: "ext4"
          b: "ZFS"
          c: "APFS"
          d: "NTFS"
        explanation: ""
        answer: "c"
      - id: "q1_5"
        type: "mcq"
        label: "5. Heslá v macOS od verzie 10.8+ sú ukladané typicky pomocou:"
        options:
          a: "SHA1 bez soli"
          b: "SHA2-512 s PBKDF2"
          c: "LM Hash"
          d: "čistého textu"
        explanation: ""
        answer: "b"
      - id: "q1_6"
        type: "mcq"
        label: "6. Ktorá kryptografická knižnica je typická systémová odpoveď pre macOS/iOS?"
        options:
          a: "CommonCrypto"
          b: "LANMAN"
          c: "Winlogon"
          d: "SAM"
        explanation: ""
        answer: "a"
      - id: "q1_7"
        type: "mcq"
        label: "7. Klíčenka v macOS slúži na:"
        options:
          a: "ukladanie hesiel, certifikátov a kľúčov"
          b: "správu partícií disku"
          c: "šifrovanie kernelu pri boote"
          d: "správu ACL v NTFS"
        explanation: ""
        answer: "a"
      - id: "q1_8"
        type: "mcq"
        label: "8. Apple obdoba bezpečnostného čipu na ochranu kľúčov je:"
        options:
          a: "Secure Enclave"
          b: "SAM"
          c: "BitLocker"
          d: "Winlogon"
        explanation: ""
        answer: "a"
      - id: "q1_9"
        type: "mcq_multi"
        label: "9. Apple Remote Desktop / vzdialená správa na macOS vyžaduje povoliť:"
        options:
          a: "Remote Management"
          b: "iba Telnet"
          c: "iba SMB"
          d: "službu v zdieľaní a neblokovať ju firewallom"
        explanation: ""
        answer:
          - "a"
          - "d"
      - id: "q1_10"
        type: "mcq_multi"
        label: "10. Aplikačný firewall v macOS:"
        options:
          a: "riadi komunikáciu na úrovni aplikácií"
          b: "je určený na detailnú správu TCP/IP paketových pravidiel"
          c: "umožňuje stealth mode"
          d: "vie blokovať príchozie spojenia"
        explanation: ""
        answer:
          - "a"
          - "c"
          - "d"
  - id: "sec_2"
    title: "2. Otázky 11–20"
    questions:
      - id: "q2_1"
        type: "mcq"
        label: "11. Paketový firewall v macOS je:"
        options:
          a: "ipfw z FreeBSD"
          b: "pf prevzatý z OpenBSD"
          c: "nftables"
          d: "Windows Defender Firewall"
        explanation: ""
        answer: "b"
      - id: "q2_2"
        type: "mcq"
        label: "12. „Parental account“ v macOS je najlepšie chápať ako:"
        options:
          a: "detský účet typu standard user s obmedzeniami"
          b: "špeciálny kernel účet"
          c: "účet používaný iba pre FileVault recovery"
          d: "náhradu za root"
        explanation: ""
        answer: "a"
      - id: "q2_3"
        type: "mcq"
        label: "13. SMB štandardne používa port:"
        options:
          a: "21"
          b: "22"
          c: "139/445"
          d: "3389"
        explanation: ""
        answer: "c"
      - id: "q2_4"
        type: "mcq"
        label: "14. Telnet štandardne používa port:"
        options:
          a: "21"
          b: "22"
          c: "23"
          d: "25"
        explanation: ""
        answer: "c"
      - id: "q2_5"
        type: "mcq"
        label: "15. SSH štandardne používa port:"
        options:
          a: "20"
          b: "22"
          c: "23"
          d: "53"
        explanation: ""
        answer: "b"
      - id: "q2_6"
        type: "mcq_multi"
        label: "16. O SSH platí:"
        options:
          a: "je šifrované"
          b: "je náhradou za Telnet"
          c: "používa plaintext heslá bez ochrany"
          d: "môže používať autentizáciu kľúčom"
        explanation: ""
        answer:
          - "a"
          - "b"
          - "d"
      - id: "q2_7"
        type: "mcq"
        label: "17. Ktorý protokol je preferovaný vo Windows doméne od Windows 2000?"
        options:
          a: "LANMAN"
          b: "NTLMv1"
          c: "Kerberos"
          d: "PAP"
        explanation: ""
        answer: "c"
      - id: "q2_8"
        type: "mcq"
        label: "18. Kerberos je založený hlavne na:"
        options:
          a: "symetrickej kryptografii a ticketoch"
          b: "iba na RSA podpisoch"
          c: "iba na hashovaní MD5"
          d: "prenose hesla v čistom texte"
        explanation: ""
        answer: "a"
      - id: "q2_9"
        type: "mcq"
        label: "19. KDC v Kerberose znamená:"
        options:
          a: "Key Distribution Center"
          b: "Kernel Data Control"
          c: "Known Domain Client"
          d: "Key Debug Console"
        explanation: ""
        answer: "a"
      - id: "q2_10"
        type: "mcq_multi"
        label: "20. LM hash má ktorú známu slabinu?"
        options:
          a: "heslo delí na dve 7-bajtové časti"
          b: "používa DES odvodený z častí hesla"
          c: "je odolný voči brute-force"
          d: "ignoruje veľkosť písmen"
        explanation: ""
        answer:
          - "a"
          - "b"
          - "d"
  - id: "sec_3"
    title: "3. Otázky 21–30"
    questions:
      - id: "q3_1"
        type: "mcq"
        label: "21. SAM vo Windows je:"
        options:
          a: "súbor / databáza s účtami a hashmi hesiel"
          b: "firewall modul"
          c: "TPM náhrada"
          d: "antivírusový engine"
        explanation: ""
        answer: "a"
      - id: "q3_2"
        type: "mcq"
        label: "22. EFS vo Windows šifruje:"
        options:
          a: "celé disky"
          b: "jednotlivé súbory a priečinky na NTFS"
          c: "iba RAM"
          d: "iba bootloader"
        explanation: ""
        answer: "b"
      - id: "q3_3"
        type: "mcq"
        label: "23. BitLocker vo Windows šifruje:"
        options:
          a: "jednotlivé e-maily"
          b: "celé diskové oddiely"
          c: "iba používateľské profily"
          d: "iba externé USB myši"
        explanation: ""
        answer: "b"
      - id: "q3_4"
        type: "mcq"
        label: "24. Recovery agent pri EFS súvisí s:"
        options:
          a: "možnosťou obnoviť FEK / prístup k dátam"
          b: "routovaním paketov"
          c: "Linux PAM"
          d: "iCloud Keychain"
        explanation: ""
        answer: "a"
      - id: "q3_5"
        type: "mcq_multi"
        label: "25. DES má:"
        options:
          a: "blok 64 bitov"
          b: "efektívny kľúč 56 bitov"
          c: "blok 128 bitov"
          d: "je moderný preferovaný štandard"
        explanation: ""
        answer:
          - "a"
          - "b"
      - id: "q3_6"
        type: "mcq_multi"
        label: "26. ECB mód je nevhodný najmä preto, že:"
        options:
          a: "rovnaké bloky dávajú rovnaký ciphertext"
          b: "zachováva štruktúru dát"
          c: "používa tickety"
          d: "je asymetrický"
        explanation: ""
        answer:
          - "a"
          - "b"
      - id: "q3_7"
        type: "mcq_multi"
        label: "27. CBC mód:"
        options:
          a: "reťazí bloky cez XOR s predchádzajúcim blokom"
          b: "používa IV"
          c: "je to hashovacia funkcia"
          d: "je blokový mód"
        explanation: ""
        answer:
          - "a"
          - "b"
          - "d"
      - id: "q3_8"
        type: "mcq_multi"
        label: "28. Klasický stack buffer overflow môže viesť k:"
        options:
          a: "prepísaniu návratovej adresy"
          b: "pádu programu"
          c: "vzdialenej správe cez ARD"
          d: "spusteniu útočníkovho kódu"
        explanation: ""
        answer:
          - "a"
          - "b"
          - "d"
      - id: "q3_9"
        type: "mcq"
        label: "29. Stack canary slúži na:"
        options:
          a: "detekciu prepísania stack frame pred návratom z funkcie"
          b: "náhodné rozmiestnenie knižníc v pamäti"
          c: "šifrovanie disku"
          d: "správu používateľských účtov"
        explanation: ""
        answer: "a"
      - id: "q3_10"
        type: "mcq_multi"
        label: "30. ASLR znamená:"
        options:
          a: "náhodné rozloženie pamäťových oblastí"
          b: "ochranu pred exploitmi"
          c: "šifrovanie e-mailov"
          d: "náhradu za firewall"
        explanation: ""
        answer:
          - "a"
          - "b"
  - id: "sec_4"
    title: "4. Otázky 31–40"
    questions:
      - id: "q4_1"
        type: "mcq"
        label: "31. DEP/NX znamená:"
        options:
          a: "zákaz spúšťania kódu z dátových stránok pamäte"
          b: "šifrovanie DNS prevádzky"
          c: "správu ACL zoznamov"
          d: "povolenie execute bitu pre všetkých"
        explanation: ""
        answer: "a"
      - id: "q4_2"
        type: "mcq_multi"
        label: "32. Debugger slúži na:"
        options:
          a: "krokovanie programu"
          b: "breakpointy"
          c: "sledovanie registrov a pamäte"
          d: "kompresiu súborov"
        explanation: ""
        answer:
          - "a"
          - "b"
          - "c"
      - id: "q4_3"
        type: "mcq"
        label: "33. GDB je:"
        options:
          a: "GNU Debugger"
          b: "dekompilér zdrojového kódu Java"
          c: "linuxový package manager"
          d: "antivírus"
        explanation: ""
        answer: "a"
      - id: "q4_4"
        type: "mcq_multi"
        label: "34. Dekompilér typicky produkuje:"
        options:
          a: "C-like vysokúrovňový pseudokód"
          b: "presne pôvodné názvy všetkých premenných a komentárov"
          c: "assembler"
          d: "aproximáciu pôvodnej logiky programu"
        explanation: ""
        answer:
          - "a"
          - "d"
      - id: "q4_5"
        type: "mcq_multi"
        label: "35. Reverse engineering malware môže zahŕňať:"
        options:
          a: "statickú analýzu"
          b: "dynamickú analýzu"
          c: "debugger"
          d: "sandbox/VM"
        explanation: ""
        answer:
          - "a"
          - "b"
          - "c"
          - "d"
      - id: "q4_6"
        type: "mcq_multi"
        label: "36. SELinux je príklad:"
        options:
          a: "DAC"
          b: "MAC"
          c: "Mandatory Access Control"
          d: "antivírusového modulu"
        explanation: ""
        answer:
          - "b"
          - "c"
      - id: "q4_7"
        type: "mcq"
        label: "37. V SELinuxe mód enforcing znamená:"
        options:
          a: "pravidlá sa iba logujú"
          b: "politika sa vynucuje jadrom"
          c: "SELinux je vypnutý"
          d: "root môže všetko obísť"
        explanation: ""
        answer: "b"
      - id: "q4_8"
        type: "mcq_multi"
        label: "38. Pre SELinux platí:"
        options:
          a: "používa labels / kontexty"
          b: "dôležitý je type enforcement"
          c: "root nemusí automaticky obísť MAC pravidlá"
          d: "je to náhrada za PBKDF2"
        explanation: ""
        answer:
          - "a"
          - "b"
          - "c"
      - id: "q4_9"
        type: "mcq"
        label: "39. Linuxové práva rwxr-xr-x v číselnom tvare sú:"
        options:
          a: "777"
          b: "755"
          c: "754"
          d: "555"
        explanation: ""
        answer: "b"
      - id: "q4_10"
        type: "mcq"
        label: "40. `chmod 555` znamená:"
        options:
          a: "rwxrwxrwx"
          b: "r-xr-xr-x"
          c: "rw-r--r--"
          d: "r--r--r--"
        explanation: ""
        answer: "b"
  - id: "sec_5"
    title: "5. Otázky 41–50"
    questions:
      - id: "q5_1"
        type: "mcq_multi"
        label: "41. Sticky bit na adresári znamená:"
        options:
          a: "súbory môže mazať iba vlastník súboru alebo root"
          b: "spúšťa sa s právami vlastníka súboru"
          c: "ide o SGID"
          d: "typické použitie je `/tmp`"
        explanation: ""
        answer:
          - "a"
          - "d"
      - id: "q5_2"
        type: "mcq_multi"
        label: "42. SUID znamená:"
        options:
          a: "súbor sa spúšťa s právami vlastníka súboru"
          b: "používa sa napr. pri `passwd`"
          c: "je to právo iba pre adresáre"
          d: "zapisuje sa ako `s` na execute pozícii vlastníka"
        explanation: ""
        answer:
          - "a"
          - "b"
          - "d"
      - id: "q5_3"
        type: "mcq_multi"
        label: "43. SGID na adresári znamená:"
        options:
          a: "nové súbory dedia skupinu adresára"
          b: "súbor sa spúšťa s právami skupiny"
          c: "je to to isté ako sticky bit"
          d: "môže platiť pre súbor aj adresár"
        explanation: ""
        answer:
          - "a"
          - "b"
          - "d"
      - id: "q5_4"
        type: "mcq"
        label: "44. V Linuxe zmení vlastníka súboru príkaz:"
        options:
          a: "chmod"
          b: "chown"
          c: "passwd"
          d: "setfacl"
        explanation: ""
        answer: "b"
      - id: "q5_5"
        type: "mcq_multi"
        label: "45. Súbor `/etc/passwd` je typicky:"
        options:
          a: "čitateľný pre všetkých"
          b: "miesto, kde sú hashe hesiel"
          c: "databáza základných info o účtoch"
          d: "bežne s právami 644"
        explanation: ""
        answer:
          - "a"
          - "c"
          - "d"
      - id: "q5_6"
        type: "mcq_multi"
        label: "46. Súbor `/etc/shadow` je typicky:"
        options:
          a: "obsahuje hashe hesiel"
          b: "je prístupný bežnému používateľovi"
          c: "má obmedzené práva"
          d: "používa sa pri autentizácii"
        explanation: ""
        answer:
          - "a"
          - "c"
          - "d"
      - id: "q5_7"
        type: "mcq_multi"
        label: "47. Linux ACL rozširuje klasický model práv o:"
