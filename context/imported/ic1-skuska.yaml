          b: "mask položku"
          c: "povinné šifrovanie súborov"
          d: "default ACL na adresároch"
        explanation: ""
        answer:
          - "a"
          - "b"
          - "d"
      - id: "q5_8"
        type: "mcq_multi"
        label: "48. Pri Linux ACL môže `mask`:"
        options:
          a: "obmedziť efektívne práva pomenovaných user/group záznamov"
          b: "zvýšiť práva nad explicitne nastavené maximum"
          c: "ovplyvniť group-class oprávnenia"
          d: "byť pri riešení prístupu veľmi dôležitá"
        explanation: ""
        answer:
          - "a"
          - "c"
          - "d"
      - id: "q5_9"
        type: "mcq"
        label: "49. SNAT sa typicky vykonáva v chain:"
        options:
          a: "PREROUTING"
          b: "POSTROUTING"
          c: "INPUT"
          d: "FORWARD"
        explanation: ""
        answer: "b"
      - id: "q5_10"
        type: "mcq"
        label: "50. DNAT sa typicky vykonáva v chain:"
        options:
          a: "PREROUTING"
          b: "POSTROUTING"
          c: "OUTPUT"
          d: "INPUT"
        explanation: ""
        answer: "a"
