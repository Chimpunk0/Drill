        label: "1. Akú veľkosť má MD5 blok?"
        answer: "c"
        options:
          a: "128 bitov"
          b: "256 bitov"
          c: "512 bitov"
          d: "1024 bitov"
        explanation: "MD5 pracuje s blokmi 512 bitov."

      - type: "mcq"
        label: "2. Koľko 32-bitových slov je v jednom MD5 bloku?"
        answer: "b"
        options:
          a: "8"
          b: "16"
          c: "32"
          d: "64"
        explanation: "512 / 32 = 16 slov."

      - type: "mcq"
        label: "3. Aké sú stavové premenné MD5?"
        answer: "d"
        options:
          a: "W, X, Y, Z"
          b: "P, Q, R, S"
          c: "H0, H1, H2, H3"
          d: "A, B, C, D"
        explanation: "Materiál explicitne uvádza A, B, C, D."

      - type: "mcq"
        label: "4. Koľko iterácií vykonáva myMD5Transform?"
        answer: "a"
        options:
          a: "64"
          b: "16"
          c: "32"
          d: "128"
        explanation: "Sú to 4 kolá po 16 iteráciách."

      - type: "mcq"
        label: "5. Ako sa dá získať číslo kola z iter?"
        answer: "c"
        options:
          a: "iter & 0x0F"
          b: "iter << 4"
          c: "(iter >> 4) & 0x03"
          d: "(iter ^ 4) & 0xFF"
        explanation: "Materiál uvádza práve tento výraz."

      - type: "mcq"
        label: "6. Ktorý výraz pre F patrí do 1. kola?"
        answer: "b"
        options:
          a: "B ^ C ^ D"
          b: "(B & C) | (~B & D)"
          c: "C ^ (B | ~D)"
          d: "(B & D) | (C & ~D)"
        explanation: "To je definícia F v prvom kole."

      - type: "mcq"
        label: "7. Ktorý výraz pre F patrí do 3. kola?"
        answer: "a"
        options:
          a: "B ^ C ^ D"
          b: "(B & C) | (~B & D)"
          c: "(B & D) | (C & ~D)"
          d: "B | C | D"
        explanation: "Tretie kolo používa XOR troch registrov."

      - type: "mcq"
        label: "8. Čo má robiť pomocná funkcia Rotate?"
        answer: "d"
        options:
          a: "Načítať blok zo súboru"
          b: "Pripočítať dĺžku správy"
          c: "Vymazať digest"
          d: "Rotovať 32-bitovú hodnotu doľava o zadaný počet bitov"
        explanation: "Rotate je bitová rotácia doľava."

      - type: "mcq_multi"
        label: "9. Ktoré tvrdenia o myMD5Final sú správne?"
        answer:
          - "a"
          - "c"
          - "d"
        options:
          a: "Po doplnení paddingu má zavolať myMD5Transform."
          b: "Má zavolať pthread_join."
          c: "Má uložiť výsledné state hodnoty do digest."
          d: "Na koniec posledného bloku sa dopĺňa dĺžka správy."
        explanation: "To je podstata finalizačného kroku."

      - type: "text"
