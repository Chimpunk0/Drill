<!doctype html>
<html lang="cs">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Kvíz – Bezpečnost a vývoj software</title>
        <link rel="icon" href="favicon.svg" type="image/svg+xml" sizes="any" />
        <link rel="stylesheet" href="style.css" />
        <base target="_blank" />
    </head>
    <body>
        <div class="layout">
            <!-- Sidebar -->
            <aside class="sidebar" id="sidebar">
                <!-- 1. Header (len nadpis a tlačidlo zavrieť) -->
                <div class="sidebar-header">
                    <h2>Obsah</h2>
                    <div class="sidebar-header-actions">
                        <button
                            class="theme-toggle"
                            id="theme-toggle"
                            title="Prepnúť tmavý / svetlý režim"
                        >
                            <img id="theme-toggle-icon" src="moon-stars-svgrepo-com.svg" alt="Tmavý režim" width="20" height="20" />
                        </button>
                        <button
                            class="shortcut-settings-btn"
                            id="shortcut-settings-btn"
                            title="Nastavenia klávesových skratiek"
                        >
                            Skratky
                        </button>
                        <button
                            class="close-sidebar"
                            id="close-sidebar-btn"
                            title="Zavrieť sidebar"
                        >
                            ×
                        </button>
                    </div>
                </div>

                <!-- 2. Quiz Set Selector -->
                <div class="quiz-set-selector" id="quiz-set-selector">
                    <div class="quiz-set-selector-header" id="quiz-set-selector-header">
                        <span class="filter-icon" id="quiz-set-icon">▼</span>
                        <span>Kvízový set</span>
                    </div>
                    <div class="quiz-set-list" id="quiz-set-list">
                        <!-- Generated by JavaScript -->
                    </div>
                </div>

                <!-- 3. Filter sekcia (SAMOSTATNE pod headerom, nie vnútri neho!) -->
                <div class="filter-section" id="filter-section">
                    <div class="filter-header" id="filter-header">
                        <span class="filter-icon" id="filter-icon">▼</span>
                        <span>Zobraziť sekcie</span>
                    </div>
                    <div class="filter-content" id="filter-content">
                        <div class="filter-actions">
                            <button id="select-all-sections-btn">
                                Všetky
                            </button>
                            <button id="select-no-sections-btn">
                                Žiadne
                            </button>
                        </div>
                        <div class="filter-list" id="filter-list">
                            <!-- Generuje sa cez JS -->
                        </div>
                        <button
                            class="apply-filter-btn"
                            id="apply-filter-btn"
                        >
                            Použiť filter
                        </button>
                    </div>
                </div>

                <!-- Flashcard Mode Button -->
                <button
                    class="flashcard-btn-sidebar"
                    id="open-flashcards-btn"
                >
                    Flashcard – otázka po otázke
                </button>

                <!-- 3. Tree navigácia (len JEDNA, nie dve!) -->
            </aside>

            <!-- Overlay for mobile -->
            <div
                class="sidebar-overlay"
                id="sidebar-overlay"
            ></div>

            <aside class="right-sidebar hidden" id="right-sidebar">
                <div class="right-sidebar-header">
                    <h2>Štruktúra kvízu</h2>
                    <button
                        class="close-sidebar"
                        id="close-right-sidebar-btn"
                        title="Zavrieť štruktúru"
                    >
                        ×
                    </button>
                </div>
                <nav class="tree-nav" id="tree-nav">
                    <!-- Generated by JavaScript -->
                </nav>
            </aside>

            <div class="shortcut-settings-overlay" id="shortcut-settings-overlay">
                <div class="shortcut-settings-panel">
                    <div class="shortcut-settings-header">
                        <h2>Klávesové skratky</h2>
                        <button
                            class="close-sidebar"
                            id="close-shortcut-settings-btn"
                            title="Zavrieť nastavenia"
                        >
                            ×
                        </button>
                    </div>
                    <div class="shortcut-settings-row">
                        <div>
                            <strong>Ľavý sidebar</strong>
                            <p id="sidebar-shortcut-label"></p>
                        </div>
                        <button class="btn btn-secondary" id="start-shortcut-capture-btn">
                            Zmeniť
                        </button>
                    </div>
                    <p class="shortcut-capture-hint" id="shortcut-capture-hint"></p>
                </div>
            </div>

            <div class="command-palette-overlay" id="command-palette-overlay">
                <div class="command-palette">
                    <input
                        id="command-palette-input"
                        class="command-palette-input"
                        type="text"
                        placeholder="Vyhľadať príkaz..."
                        autocomplete="off"
                    />
                    <div class="command-palette-list" id="command-palette-list"></div>
                </div>
            </div>

            <!-- Main Content -->
            <main class="main-content" id="main-content">
                <div class="top-bar">
                    <div class="top-bar-actions">
                        <button
                            class="top-bar-btn menu-toggle"
                            id="menu-toggle"
                            title="Zobraziť menu"
                        >
                            <span>Menu</span>
                        </button>
                        <button
                            class="top-bar-btn right-sidebar-toggle"
                            id="right-sidebar-toggle"
                            title="Zobraziť štruktúru kvízu"
                        >
                            Štruktúra
                        </button>
                        <img
                            class="top-bar-paper-edge"
                            src="torn_paper_header.svg"
                            alt=""
                            aria-hidden="true"
                        />
                    </div>
                </div>

                <div class="container">
                    <div id="normal-mode-view">
                        <div id="quiz-sections-mount"></div>

                        <!-- Akcie a výsledok -->
                        <div class="actions">
                            <button class="btn btn-secondary" id="clear-btn">
                                Vymazať odpovede
                            </button>
                            <button class="btn btn-primary" id="eval-btn">
                                Vyhodnotiť kvíz
                            </button>
                        </div>
                        <div class="actions actions-secondary">
                            <button
                                id="shuffle-btn"
                                class="btn action-btn action-btn-shuffle"
                            >
                                Zamiešať otázky &amp; odpovede
                            </button>
                            <button
                                class="btn action-btn action-btn-practice"
                                id="practice-btn"
                            >
                                Precvičiť chyby
                            </button>
                            <button
                                class="btn action-btn action-btn-review"
                                id="review-wrong-btn"
                            >
                                Zobraziť chyby
                            </button>
                            <button
                                class="btn action-btn action-btn-clear-wrong"
                                id="clear-wrong-btn"
                            >
                                Vymazať históriu chýb
                            </button>
                        </div>
                        <div class="storage-info-wrap">
                            <small id="storage-info">
                                Odpovede sa automaticky ukladajú do prehliadača
                            </small>
                        </div>

                        <div class="result-container" id="result-container">
                            <div id="result-text"></div>
                            <div class="progress-bar">
                                <div
                                    class="progress-fill"
                                    id="progress-fill"
                                ></div>
                            </div>
                        </div>
                    </div>

                    <div id="flashcard-view" aria-hidden="true">
                        <div class="fc-container">
                            <div class="fc-header">
                                <span class="fc-title" id="fc-title"
                                    >Flashcard režim</span
                                >
                                <button
                                    class="fc-close"
                                    id="fc-close-btn"
                                    title="Zavrieť"
                                >
                                    ×
                                </button>
                            </div>
                            <div class="fc-progress-wrap">
                                <div class="fc-progress-info">
                                    <span id="fc-progress-text">Otázka 1 z N</span>
                                    <span id="fc-progress-pct">0%</span>
                                </div>
                                <div class="fc-progress-bar">
                                    <div
                                        class="fc-progress-fill"
                                        id="fc-progress-fill"
                                    ></div>
                                </div>
                                <div class="fc-score-row">
                                    <span class="fc-score-correct" id="fc-correct-count"
                                        >0 správnych</span
                                    >
                                    <span class="fc-score-wrong" id="fc-wrong-count"
                                        >0 nesprávnych</span
                                    >
                                    <span class="fc-score-left" id="fc-left-count"
                                        >0 zostáva</span
                                    >
                                </div>
                            </div>
                            <div class="fc-body" id="fc-body">
                                <!-- Dynamic content -->
                            </div>
                            <div class="fc-footer" id="fc-footer">
                                <span class="fc-hint" id="fc-hint"></span>
                                <div class="fc-footer-actions">
                                    <button
                                        class="fc-btn fc-btn-end"
                                        id="fc-end-btn"
                                    >
                                        Skončiť
                                    </button>
                                    <button
                                        class="fc-btn fc-btn-next"
                                        id="fc-next-btn"
                                        disabled
                                    >
                                        Ďalšia →
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
        <script src="confg.js"></script>
        <script src="app.js"></script>
    </body>
</html>
